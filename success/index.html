<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success - North Gate Company</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #0f172a;
            font-family: 'Inter', sans-serif;
            color: white;
            text-align: center;
        }

        .success-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 1s ease-out;
        }

        .check-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: rgba(34, 197, 94, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 50px rgba(34, 197, 94, 0.2);
            animation: pulse 2s infinite ease-in-out;
            margin-bottom: 10px;
        }

        .checkmark {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: block;
            stroke-width: 4;
            stroke: #22c55e;
            stroke-miterlimit: 10;
        }

        .checkmark__circle {
            stroke-dasharray: 166;
            stroke-dashoffset: 166;
            stroke-width: 4;
            stroke-miterlimit: 10;
            stroke: rgba(34, 197, 94, 0.3);
            fill: none;
            animation: stroke 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards;
        }

        .checkmark__check {
            transform-origin: 50% 50%;
            stroke-dasharray: 48;
            stroke-dashoffset: 48;
            animation: stroke 0.3s cubic-bezier(0.65, 0, 0.45, 1) 0.4s forwards;
            stroke-width: 4;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        h1 {
            margin-top: 30px;
            font-size: 2.5rem;
            font-weight: 600;
            color: #f8fafc;
            letter-spacing: -0.025em;
        }

        p {
            margin-top: 10px;
            font-size: 1.1rem;
            color: #94a3b8;
            max-width: 400px;
            line-height: 1.5;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            70% { box-shadow: 0 0 0 30px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        @keyframes stroke {
            100% {
                stroke-dashoffset: 0;
            }
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="check-circle">
            <svg class="checkmark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52">
                <circle class="checkmark__circle" cx="26" cy="26" r="25" fill="none" />
                <path class="checkmark__check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8" />
            </svg>
        </div>
        <h1>Deployment Successful!</h1>
        <p>If you're seeing this animated tick, it means your repository is perfectly linked and Netlify has auto-deployed your latest push to GitHub.</p>
    </div>
</body>
</html>
