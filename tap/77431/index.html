<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>North Gate Company - Service Feedback</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b0b0b;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            overflow: hidden;
        }

        .container {
            max-width: 450px;
            width: 90%;
            padding: 2.5rem 1.5rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            transition: all 0.5s ease;
        }

        h1 {
            margin-top: 0;
            font-weight: 600;
            font-size: 1.6rem;
            margin-bottom: 1.5rem;
        }

        /* People Selection */
        .people-container {
            display: flex;
            justify-content: space-around;
            margin-bottom: 2rem;
        }
        
        .person {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.3s ease, opacity 0.3s ease;
            opacity: 0.6;
        }

        .person:hover {
            opacity: 1;
        }

        .person.selected {
            opacity: 1;
            transform: scale(1.1);
        }
        
        .person.not-selected {
            opacity: 0.3;
            transform: scale(0.9);
        }

        .person img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid transparent;
            object-fit: cover;
            transition: all 0.3s ease;
        }

        .person.selected img {
            border-color: #00aaff;
            box-shadow: 0 0 15px rgba(0, 170, 255, 0.5);
        }

        .person p {
            margin: 10px 0 0;
            font-size: 0.9rem;
            font-weight: 400;
        }

        /* Star Rating */
        .stars-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 1.5rem;
            max-height: 50px;
            overflow: hidden;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s ease;
            pointer-events: none;
        }
        
        .stars-container.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .star {
            font-size: 2.2rem;
            color: rgba(255, 255, 255, 0.2);
            cursor: pointer;
            transition: color 0.2s ease, transform 0.2s ease;
        }

        .star:hover {
            transform: scale(1.2);
        }

        .star.active {
            color: #fbb034;
            text-shadow: 0 0 10px rgba(251, 176, 52, 0.5);
        }

        /* Feedback Box */
        .feedback-container {
            opacity: 0;
            max-height: 0;
            overflow: hidden;
            transition: all 0.5s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .feedback-container.visible {
            opacity: 1;
            max-height: 200px;
            pointer-events: auto;
        }

        textarea {
            width: 100%;
            height: 80px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            padding: 10px;
            font-family: inherit;
            font-size: 0.95rem;
            resize: none;
            outline: none;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }

        textarea:focus {
            border-color: #00aaff;
        }

        .btn-submit {
            margin-top: 15px;
            background: linear-gradient(135deg, #00d2ff, #007aff);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            pointer-events: auto;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 170, 255, 0.4);
        }

        /* Success screen overlays */
        .success-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #0b0b0b;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        
        .success-overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }

        /* Tick Animation from original */
        .success-animation {
            width: 80px;
            height: 80px;
            position: relative;
            margin-bottom: 20px;
        }

        .gpay-tick {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: block;
            stroke-width: 3;
            stroke: #4BB543;
            stroke-miterlimit: 10;
            box-shadow: inset 0px 0px 0px #4BB543;
        }

        .success-overlay.visible .gpay-tick {
            animation: fill .4s ease-in-out .4s forwards, scale .3s ease-in-out .9s both;
        }

        .gpay-tick__circle {
            stroke-dasharray: 171;
            stroke-dashoffset: 171;
            stroke-width: 3;
            stroke-miterlimit: 10;
            stroke: #4BB543;
            fill: none;
        }
        
        .success-overlay.visible .gpay-tick__circle {
            animation: stroke 0.6s cubic-bezier(0.65, 0, 0.45, 1) 0.1s forwards;
        }

        .gpay-tick__check {
            transform-origin: 50% 50%;
            stroke-dasharray: 48;
            stroke-dashoffset: 48;
            stroke: #fff;
            stroke-width: 3;
            fill: none;
        }
        
        .success-overlay.visible .gpay-tick__check {
            animation: stroke 0.3s cubic-bezier(0.65, 0, 0.45, 1) 0.8s forwards;
        }

        @keyframes stroke {
            100% { stroke-dashoffset: 0; }
        }

        @keyframes scale {
            0%, 100% { transform: none; }
            50% { transform: scale3d(1.1, 1.1, 1); }
        }

        @keyframes fill {
            100% { box-shadow: inset 0px 0px 0px 40px #4BB543; }
        }

        /* Confetti */
        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            top: 50%;
            left: 50%;
            border-radius: 50%;
            margin-left: -4px;
            margin-top: -4px;
            opacity: 0;
            pointer-events: none;
        }

        .success-overlay.visible .confetti {
            animation: shoot 0.7s ease-out 0.8s forwards;
        }

        @keyframes shoot {
            0% { transform: rotate(var(--angle)) translateY(0) scale(0.5); opacity: 1; }
            40% { opacity: 1; }
            100% { transform: rotate(var(--angle)) translateY(-65px) scale(1); opacity: 0; }
        }

        .thank-you-msg {
            font-size: 1.8rem;
            font-weight: 600;
            color: white;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s ease;
        }

        .thank-you-msg.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .loader {
            border: 2px solid rgba(255,255,255,0.1);
            border-top: 2px solid white;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <h1>How was my service?</h1>
        
        <div class="people-container" id="peopleContainer">
             <div class="loader" style="margin: 20px auto; border-color: rgba(255,255,255,0.2); border-top-color: white; width: 30px; height: 30px;"></div>
        </div>

        <div class="stars-container" id="starsContainer">
            <span class="star" onmouseover="hoverStar(1)" onmouseout="resetStars()" onclick="selectStar(1)">★</span>
            <span class="star" onmouseover="hoverStar(2)" onmouseout="resetStars()" onclick="selectStar(2)">★</span>
            <span class="star" onmouseover="hoverStar(3)" onmouseout="resetStars()" onclick="selectStar(3)">★</span>
            <span class="star" onmouseover="hoverStar(4)" onmouseout="resetStars()" onclick="selectStar(4)">★</span>
            <span class="star" onmouseover="hoverStar(5)" onmouseout="resetStars()" onclick="selectStar(5)">★</span>
        </div>

        <div class="feedback-container" id="feedbackContainer">
            <textarea placeholder="Reason (Optional)" id="feedbackText"></textarea>
            <button class="btn-submit" id="submitBtn" onclick="submitFeedback()">Submit</button>
        </div>
    </div>

    <div class="success-overlay" id="successOverlay">

            </svg>
            <div class="confetti" style="--angle: 0deg; background-color: #ff4b4b;"></div>
            <div class="confetti" style="--angle: 45deg; background-color: #4bb71b;"></div>
            <div class="confetti" style="--angle: 90deg; background-color: #00aaff;"></div>
            <div class="confetti" style="--angle: 135deg; background-color: #fbb034;"></div>
            <div class="confetti" style="--angle: 180deg; background-color: #ff4b4b;"></div>
            <div class="confetti" style="--angle: 225deg; background-color: #4bb71b;"></div>

        </div>
        <p class="thank-you-msg" id="thankYouMsg">Thank You!</p>
        <p style="font-size: 0.8rem; margin-top: 1rem; opacity: 0.5; font-weight:300;">Redirecting you shortly...</p>
    </div>

    <script>
        const cardId = "77431";
        // Session guard: block re-submission within 24 hours
        const REVIEW_KEY = 'ng_reviewed_' + cardId;
        const lastReview = localStorage.getItem(REVIEW_KEY);
        if (lastReview && (Date.now() - parseInt(lastReview)) < 24 * 60 * 60 * 1000) {
            document.getElementById('mainContainer').innerHTML = `
                <div style="text-align:center;padding:2rem;">
                    <div style="font-size:3rem;margin-bottom:1rem;color:#4BB543;">✓</div>
                    <h2 style="color:#4BB543;margin-bottom:0.5rem;">Already Reviewed</h2>
                    <p style="opacity:0.6;font-size:0.9rem;">You've already left a review today.<br>Come back tomorrow!</p>
                </div>`;
        }
        
        let targetUrl = 'https://northgatecompany.co.uk'; // Fallback
        let selectedPerson = null;
        let selectedStarValue = 0;
        let currentHover = 0;
        
        async function loadProfilesAndDest() {
            try {
                const response = await fetch(`/.netlify/functions/api?id=${cardId}`);
                if (response.ok) {
                    const data = await response.json();
                    if (data.url) targetUrl = data.url;
                    
                    const profiles = data.profiles || [];
                    renderProfiles(profiles);
                } else {
                    renderProfiles([]);
                }
            } catch (e) {
                console.error("Failed to load");
                renderProfiles([]);
            }
        }
        
        function renderProfiles(profiles) {
            const container = document.getElementById('peopleContainer');
            container.innerHTML = '';
            
            if (profiles.length === 0) {
                container.innerHTML = '<p style="opacity: 0.6; font-size: 0.9em; width: 100%;">No representatives assigned.</p>';
                return;
            }
            
            profiles.forEach(p => {
                const div = document.createElement('div');
                div.className = 'person';
                div.dataset.profileId = p.id || p.name;
                div.dataset.profileName = p.name;
                div.dataset.profilePhoto = p.photoUrl || '';
                div.onclick = function() { selectPerson(this); };
                
                const img = document.createElement('img');
                img.src = p.photoUrl ? p.photoUrl : `https://ui-avatars.com/api/?name=${encodeURIComponent(p.name)}&background=random`;
                img.alt = p.name;
                
                const pTag = document.createElement('p');
                pTag.textContent = p.name;
                
                div.appendChild(img);
                div.appendChild(pTag);
                container.appendChild(div);
            });
        }
        
        loadProfilesAndDest();

        const stars = document.querySelectorAll('.star');

        let selectedPersonId = null;
        let selectedPersonPhoto = '';

        function selectPerson(element) {
            // Deselect others, select this one
            document.querySelectorAll('.person').forEach(p => {
                p.classList.remove('selected');
                p.classList.add('not-selected');
            });
            element.classList.remove('not-selected');
            element.classList.add('selected');
            selectedPerson = element.dataset.profileName || element.querySelector('p').textContent;
            selectedPersonId = element.dataset.profileId || selectedPerson;
            selectedPersonPhoto = element.dataset.profilePhoto || '';

            // Show stars
            document.getElementById('starsContainer').classList.add('visible');
        }

        function hoverStar(value) {
            stars.forEach((star, index) => {
                if (index < value) star.classList.add('active');
                else star.classList.remove('active');
            });
        }

        function resetStars() {
            stars.forEach((star, index) => {
                if (index < selectedStarValue) star.classList.add('active');
                else star.classList.remove('active');
            });
        }

        function selectStar(value) {
            selectedStarValue = value;
            resetStars();
            // Show feedback text area
            document.getElementById('feedbackContainer').classList.add('visible');
        }

        async function submitFeedback() {
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '<span class="loader"></span> Sending...';
            btn.style.pointerEvents = 'none';
            document.getElementById('feedbackText').disabled = true;

            const comment = document.getElementById('feedbackText').value.trim();

            // Log review to Firebase via API (fire-and-forget, don't block UX)
            // Lock immediately so double-taps and network failures don't allow re-submission
            localStorage.setItem(REVIEW_KEY, Date.now().toString());

            try {
                const res = await fetch('/.netlify/functions/api', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        review: {
                            cardId: cardId,
                            profileId: selectedPersonId || selectedPerson,
                            profileName: selectedPerson,
                            profilePhoto: selectedPersonPhoto,
                            starRating: selectedStarValue,
                            comment: comment,
                            timestamp: new Date().toISOString()
                        }
                    })
                });
                if (res.status === 429) {
                    document.getElementById('mainContainer').innerHTML = `
                        <div style="text-align:center;padding:2rem;">
                            <div style="font-size:3rem;margin-bottom:1rem;color:#4BB543;">✓</div>
                            <h2 style="color:#4BB543;margin-bottom:0.5rem;">Already Reviewed</h2>
                            <p style="opacity:0.6;font-size:0.9rem;">You've already left a review today.<br>Come back tomorrow!</p>
                        </div>`;
                    btn.style.display = 'none';
                    return;
                }
            } catch(e) {
                // Silently fail — don't block customer UX
                console.warn('Review log failed:', e);
            }

            // Hide Main container gracefully
            document.getElementById('mainContainer').style.opacity = '0';
            document.getElementById('mainContainer').style.transform = 'scale(0.95)';
            
            // Show Success Overlay
            setTimeout(() => {
                document.getElementById('successOverlay').classList.add('visible');
                
                setTimeout(() => {
                    document.getElementById('thankYouMsg').classList.add('visible');
                }, 1400);

                setTimeout(() => {
                    executeRedirect();
                }, 2200);

            }, 400);
        }

        function executeRedirect() {
            window.location.href = targetUrl;
        }
    </script>
</body>
</html>
